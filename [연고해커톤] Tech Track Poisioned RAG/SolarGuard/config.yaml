corpus:
  dir: distribution/corpus

parsing:
  backend: pdfplumber
  output_dir: parsed_corpus
  force: false

  pdfplumber:
    extract_tables: true

chunking:
  active_strategy: chunk_slide
  strategies:
    - chunk_slide
    - chunk_block
  max_chunk_chars: 1200
  overlap_chars: 400
  block_min_chars: 1200
  block_max_chars: 1600
  slide_output_filename: chunks_slide.jsonl
  block_output_filename: chunks_block.jsonl

indexing:
  bm25:
    k1: 1.5
    b: 0.75
    top_k: 30
  dense:
    enabled: false
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024
    batch_size: 32
    device: auto
    query_instruction: "Represent this sentence for searching relevant passages: "
    normalize_embeddings: true
    show_progress_bar: true
    max_seq_length: 512
    force: false
    faiss_filename: dense.faiss
    metadata_filename: dense_metadata.jsonl
    embeddings_filename: dense_embeddings.npy
    manifest_filename: dense_manifest.json

retrieval:
  bm25_top_k: 30
  dense_top_k: 10
  final_top_k: 20
  iterative:
    enabled: true
    # context_mode:
    # - rerank: always keep retrieval.final_top_k chunks after each iteration.
    # - accumulate: grow the context budget by retrieval.final_top_k per retrieval run.
    context_mode: accumulate
    max_context_chunks: 60
    # Maximum number of extra retrieval rounds after the initial retrieval.
    max_iterations: 2
    iteration_decay: 0.9
    missing_need_bonus: 0.25
    cross_iteration_bonus: 0.2
    min_followup_chunks: 2
  merge:
    rrf_k: 30
    max_candidates: 80
    max_chunks_per_doc: 4
    max_chunks_per_section: 2
    coverage_weight: 0.25
    doc_repeat_penalty: 0.10

llm:
  query_analysis:
    model: solar-pro3
    enabled: true
    temperature: 0
    max_tokens: 512
  draft_generation:
    model: solar-pro
    enabled: true
    temperature: 0
    max_tokens: 768
  context_evaluation:
    model: solar-pro
    enabled: true
    temperature: 0
    max_tokens: 512
  final_generation:
    model: solar-pro
    temperature: 0
    max_tokens: 768
